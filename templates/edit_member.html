{% extends 'base.html' %}
{% block title %}Edit Member{% endblock %}

{% block content %}
<div class="page-header">
  <h1>Edit Member</h1>
  <p>Update member information</p>
</div>

<div class="card" style="max-width: 560px; margin: 0;">
  <form method="POST">
    <div class="form-group">
      <label>First Name</label>
      <input type="text" name="first_name" value="{{ member.first_name }}" required />
    </div>
    <div class="form-group">
      <label>Last Name</label>
      <input type="text" name="last_name" value="{{ member.last_name }}" required />
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" name="email" value="{{ member.email }}" required />
    </div>
    <div class="form-group">
      <label>Phone</label>
      <input type="text" name="phone" value="{{ member.phone }}" required />
    </div>
    <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center; padding:12px;">
      Save Changes
    </button>
  </form>
  <a href="/members" style="display:block; margin-top:16px; color:#64748b; font-size:14px;">← Back to Members</a>
</div>
{% endblock %}
