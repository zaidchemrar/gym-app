{% extends 'base.html' %}
{% block title %}Add Member{% endblock %}

{% block content %}
<div class="page-header">
  <h1>Add Member</h1>
  <p>Register a new gym member</p>
</div>

<div class="card" style="max-width: 480px;">
  <form method="POST">
    <div class="form-group">
      <label>First Name</label>
      <input type="text" name="first_name" placeholder="First name" required />
    </div>
    <div class="form-group">
      <label>Last Name</label>
      <input type="text" name="last_name" placeholder="Last name" required />
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" name="email" placeholder="Email address" required />
    </div>
    <div class="form-group">
      <label>Phone</label>
      <input type="text" name="phone" placeholder="Phone number" required />
    </div>
    <div class="form-group">
      <label>Join Date</label>
      <input type="date" name="join_date" required />
    </div>
    <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center;">Add Member</button>
  </form>
  <a href="/members" style="display:block; margin-top:16px; color:#64748b; font-size:14px;">← Back to Members</a>
</div>
{% endblock %}
