<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Gym Manager{% endblock %}</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #f4f6fb; display: flex; min-height: 100vh; }

    /* SIDEBAR */
    .sidebar {
      width: 240px;
      background: #0f172a;
      color: white;
      display: flex;
      flex-direction: column;
      
      padding: 30px 20px;
      position: fixed;
      height: 100vh;
    }
    .sidebar .logo {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 40px;
      color: #38bdf8;
      letter-spacing: 1px;
    }
    .sidebar .logo span { color: white; }
    .sidebar nav a {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-radius: 10px;
      color: #94a3b8;
      text-decoration: none;
      font-size: 15px;
      margin-bottom: 6px;
      transition: all 0.2s;
    }
    .sidebar nav a:hover, .sidebar nav a.active {
      background: #1e293b;
      color: white;
    }
    .sidebar .icon { font-size: 18px; }

    /* MAIN CONTENT */
    .main {
      margin-left: 240px;
      padding: 40px;
      width: 100%;
    }

    /* PAGE HEADER */
    .page-header {
      margin-bottom: 30px;
    }
    .page-header h1 {
      font-size: 26px;
      color: #0f172a;
      font-weight: 700;
    }
    .page-header p {
      color: #64748b;
      margin-top: 4px;
      font-size: 14px;
    }

    /* CARDS */
    .card {
      background: white;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      margin-bottom: 24px;
    }

    /* STATS ROW */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      margin-bottom: 30px;
    }
    .stat-card {
      background: white;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .stat-card .label { font-size: 13px; color: #64748b; margin-bottom: 8px; }
    .stat-card .value { font-size: 32px; font-weight: 700; color: #0f172a; }
    .stat-card .sub { font-size: 12px; color: #94a3b8; margin-top: 4px; }

    /* TABLE */
    table { width: 100%; border-collapse: collapse; }
    th {
      text-align: left;
      padding: 12px 16px;
      font-size: 13px;
      color: #64748b;
      border-bottom: 2px solid #f1f5f9;
      font-weight: 600;
    }
    td {
      padding: 14px 16px;
      font-size: 14px;
      color: #1e293b;
      border-bottom: 1px solid #f1f5f9;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f8fafc; }

    /* BUTTONS */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 18px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
    }
    .btn-primary { background: #38bdf8; color: #0f172a; }
    .btn-primary:hover { background: #0ea5e9; color: white; }
    .btn-danger { background: #fee2e2; color: #dc2626; }
    .btn-danger:hover { background: #dc2626; color: white; }
    .btn-success { background: #dcfce7; color: #16a34a; }
    .btn-success:hover { background: #16a34a; color: white; }

    /* BADGES */
    .badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }
    .badge-paid { background: #dcfce7; color: #16a34a; }
    .badge-unpaid { background: #fee2e2; color: #dc2626; }

    /* FORMS */
    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 6px; }
    .form-group input, .form-group select {
      width: 100%;
      padding: 10px 14px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 14px;
      color: #1e293b;
      transition: border 0.2s;
    }
    .form-group input:focus, .form-group select:focus {
      outline: none;
      border-color: #38bdf8;
    }

    /* FLASH MESSAGES */
    .flash {
      padding: 14px 18px;
      border-radius: 10px;
      margin-bottom: 20px;
      font-size: 14px;
      font-weight: 500;
    }
    .flash-success { background: #dcfce7; color: #16a34a; }
    .flash-error { background: #fee2e2; color: #dc2626; }
  </style>
</head>
<body>
  <div class="sidebar">
    <div class="logo">🏋️ <span>GymPro</span></div>
    <nav>
      <a href="/" class="{{ 'active' if request.path == '/' }}">
        <span class="icon">📊</span> Dashboard
      </a>
      <a href="/members" class="{{ 'active' if request.path == '/members' }}">
        <span class="icon">👥</span> Members
      </a>
      <a href="/trainers" class="{{ 'active' if request.path == '/trainers' }}">
  <span class="icon">💪</span> Trainers
</a>
      <a href="/sessions" class="{{ 'active' if request.path == '/sessions' }}">
        <span class="icon">🏃</span> Sessions
      </a>
      <a href="/payments" class="{{ 'active' if request.path == '/payments' }}">
        <span class="icon">💶</span> Payments
      </a>
      <a href="/logout" style="margin-top: auto; color: #ef4444;">
      <span class="icon">🚪</span> Logout
</a>
    </nav>
  </div>

  <div class="main">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="flash flash-{{ category }}">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
  </div>
</body>
</html>
