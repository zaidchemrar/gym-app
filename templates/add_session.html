{% extends 'base.html' %}
{% block title %}Add Session{% endblock %}

{% block content %}
<div class="page-header">
  <h1>Add Session</h1>
  <p>Log a new gym session</p>
</div>

<div class="card" style="max-width: 560px; margin: 0;">
  <form method="POST">
    <div class="form-group">
      <label>Member</label>
      <select name="member_id" required>
        <option value="">Select Member</option>
        {% for member in members %}
        <option value="{{ member.id }}">{{ member.first_name }} {{ member.last_name }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="form-group">
      <label>Date</label>
      <input type="date" name="session_date" required />
    </div>
    <div class="form-group">
      <label>Session Type</label>
      <select name="session_type" required>
        <option value="">Select Type</option>
        <option value="Weights">Weights</option>
        <option value="Cardio">Cardio</option>
        <option value="CrossFit">CrossFit</option>
        <option value="Swimming">Swimming</option>
        <option value="Yoga">Yoga</option>
      </select>
    </div>
    <div class="form-group">
      <label>Duration (minutes)</label>
      <input type="number" name="duration_minutes" placeholder="e.g. 60" min="1" required />
    </div>
    <div class="form-group">
      <label>Trainer (optional)</label>
      <select name="trainer_id">
        <option value="">No Trainer</option>
        {% for trainer in trainers %}
        <option value="{{ trainer.id }}">{{ trainer.first_name }} {{ trainer.last_name }}</option>
        {% endfor %}
      </select>
    </div>
    <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center; padding:12px;">
      Add Session
    </button>
  </form>
  <a href="/sessions" style="display:block; margin-top:16px; color:#64748b; font-size:14px;">← Back to Sessions</a>
</div>
{% endblock %}
