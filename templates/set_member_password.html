{% extends 'base.html' %}
{% block title %}Set Member Password{% endblock %}

{% block content %}
<div class="page-header">
  <h1>Set Password for {{ member.first_name }} {{ member.last_name }}</h1>
  <p>This allows the member to log in to their portal</p>
</div>

<div class="card" style="max-width: 480px; margin: 0;">
  <form method="POST">
    <div class="form-group">
      <label>New Password</label>
      <input type="password" name="password" placeholder="Min 6 characters" required />
    </div>
    <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center; padding:12px;">
      Set Password
    </button>
  </form>
  <a href="/members" style="display:block; margin-top:16px; color:#64748b; font-size:14px;">← Back to Members</a>
</div>
{% endblock %}
